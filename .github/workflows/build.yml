name: Build Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # GitHub cache service outages can produce noisy "Failed to save cache entry"
          # warnings after a successful build. This project is small enough that a
          # deterministic, cache-free CI run is preferable.
          cache-disabled: true

      - name: Build plugin
        working-directory: codenotes-plugin
        run: |
          chmod +x ./gradlew
          ./gradlew test buildPlugin --no-daemon

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: code-notes-plugin
          path: codenotes-plugin/build/distributions/*.zip
