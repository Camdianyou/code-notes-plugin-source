name: Build Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
            gradle-version: "8.5"

      - name: Build plugin
        working-directory: codenotes-plugin
        run: gradle buildPlugin --no-daemon

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: code-notes-plugin
          path: codenotes-plugin/build/distributions/*.zip
